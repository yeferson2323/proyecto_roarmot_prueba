<div th:fragment="scripts">
    <script async 
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCnd5XbgIUmbTT0ZXeTxx5RjElXaWJJj5c&libraries=places&callback=initMap&loading=async">
    </script>

    <script th:inline="javascript">
        /*<![CDATA[*/

        let map;
        let userLocation = null;
        let markers = [];
        const searchApiUrl = /*[[@{/api/sos/buscar-servicios}]]*/ '';
        
        // Función de inicialización de Google Maps (llamada por el script API)
        function initMap() {
            const defaultCoords = { lat: 4.7110, lng: -74.0721 }; // Coordenadas por defecto (ej. Bogotá)
            
            // CORRECCIÓN 2: Se eliminan los 'styles' para evitar conflicto con 'mapId'
            map = new google.maps.Map(document.getElementById("mapa"), {
                center: defaultCoords,
                zoom: 12,
                /*mapId: 'TU_MAP_ID_REAL_DE_LA_NUBE', // Reemplazar con tu Map ID de la nube (si aplica)
                // Si NO usas un Map ID, elimina esta línea y deja los 'styles' si quieres un mapa oscuro*/
            });
            
            // Mostrar el punto de carga inicial en el mapa (esta línea es redundante si tienes el HTML del mapa bien definido, pero se deja)
            //document.getElementById("mapa").innerHTML = '';

            // Intenta geolocalizar al usuario inmediatamente
            detectarPosicionUsuario(); 
        }

        // ========== 1. Geolocalización ==========
        
        function detectarPosicionUsuario() {
            const ubicacionInput = document.getElementById('ubicacion-actual');
            const btnGeolocalizar = document.getElementById('btn-geolocalizar');
            
            btnGeolocalizar.disabled = true;
            ubicacionInput.value = "Detectando...";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLocation = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };
                        
                        ubicacionInput.value = `Lat: ${userLocation.lat.toFixed(4)}, Lng: ${userLocation.lng.toFixed(4)}`;
                        
                        // Centrar el mapa en la ubicación del usuario
                        map.setCenter(userLocation);
                        map.setZoom(14);
                        
                        // Colocar un marcador en la posición del usuario
                        addUserMarker(userLocation);
                        
                        btnGeolocalizar.disabled = false;
                    },
                    (error) => {
                        ubicacionInput.value = "Ubicación no disponible (Usando coordenadas por defecto).";
                        btnGeolocalizar.disabled = false;
                        userLocation = null;
                        console.error("Error al obtener la ubicación: ", error);
                    }
                );
            } else {
                ubicacionInput.value = "Geolocalización no soportada por el navegador.";
                btnGeolocalizar.disabled = true;
            }
        }
        
        function addUserMarker(location) {
            new google.maps.Marker({
                position: location,
                map: map,
                title: "Mi Ubicación",
                icon: {
                    url: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png' // Icono azul para el usuario
                }
            });
        }


        // ========== 2. Búsqueda y Llamada AJAX ==========
        
        function buscarServicios() {
            if (!userLocation) {
                alert("Por favor, detecta tu posición antes de buscar servicios.");
                return;
            }

            const selectedRadio = document.querySelector('input[name="tipo-asistencia"]:checked');
            const keyword = selectedRadio ? selectedRadio.value : 'moto repair';
            
            const resultadosLista = document.getElementById('resultados-lista');
            const countResults = document.getElementById('count-results');
            const btnBuscar = document.getElementById('btn-buscar');
            
            btnBuscar.disabled = true;
            resultadosLista.innerHTML = '<p class="text-center text-red-500">Buscando servicios cerca...</p>';
            
            // Datos a enviar al SosRestController
            const requestData = {
                latitude: userLocation.lat,
                longitude: userLocation.lng,
                keyword: keyword 
            };
            
                fetch(searchApiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(requestData)
            })
            .then(response => {
                // Si no es una respuesta exitosa (código 4xx o 5xx)
                if (!response.ok) {
                    // Intentamos leer el cuerpo del error (puede ser HTML o JSON)
                    return response.text().then(text => {
                        // Creamos un mensaje de error más detallado para debug
                        let errorMessage = `Error HTTP ${response.status}: ${response.statusText || 'Error desconocido'}`;
                        if (text) {
                            // Si el cuerpo es grande (ej. HTML de un error 500) solo mostramos el inicio
                            const snippet = text.length > 200 ? text.substring(0, 200) + '...' : text;
                            errorMessage += ` | Cuerpo: ${snippet}`;
                        }
                        throw new Error(errorMessage);
                    });
                }
                // Si la respuesta es OK, procedemos a leer el JSON
                return response.json();
            })
            .then(data => {
                displayResults(data.results, data.count);
                btnBuscar.disabled = false;
            })
            .catch(error => {
                // Este catch ahora recibirá el error detallado de la línea anterior
                console.error('Error al buscar servicios:', error);
                // Mostramos el mensaje de error capturado al usuario
                resultadosLista.innerHTML = `<p class="text-red-500">Error: ${error.message}</p>`;
                countResults.innerHTML = 0;
                btnBuscar.disabled = false;
            });
        }

        // ========== 3. Mostrar Resultados ==========
        
        function displayResults(results, count) {
            const resultadosLista = document.getElementById('resultados-lista');
            const countResults = document.getElementById('count-results');
            
            // Limpiar marcadores viejos
            clearMarkers(); 
            
            resultadosLista.innerHTML = '';
            countResults.innerHTML = count;
            
            if (results && results.length > 0) {
                results.forEach(service => {
                    // Crear el elemento de la lista
                    const div = document.createElement('div');
                    div.className = 'border-b border-gray-700 py-3 flex justify-between items-center hover:bg-[#202932] transition cursor-pointer';
                    div.innerHTML = `
                        <div>
                            <p class="font-semibold text-white">${service.nombre}</p>
                            <p class="text-sm text-gray-400">${service.direccion}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-sm text-red-500 font-bold">${service.distancia} km</span>
                            <p class="text-xs text-gray-500">Distancia</p>
                        </div>
                    `;
                    resultadosLista.appendChild(div);
                    
                    // Colocar marcador en el mapa
                    addServiceMarker({ lat: service.lat, lng: service.lng }, service.nombre);
                });
            } else {
                resultadosLista.innerHTML = '<p class="text-center text-gray-400">No se encontraron servicios cercanos con esa categoría.</p>';
            }
        }
        
        function addServiceMarker(location, title) {
            const marker = new google.maps.Marker({
                position: location,
                map: map,
                title: title,
                icon: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png' // Icono rojo para los servicios
            });
            markers.push(marker);
        }

        function clearMarkers() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }
            markers = [];
        }

        // ========== 4. Event Listeners ==========
        document.getElementById('btn-geolocalizar').addEventListener('click', detectarPosicionUsuario);
        document.getElementById('btn-buscar').addEventListener('click', buscarServicios);
        
        /*]]>*/
    </script>
</div>
