<div th:fragment="scripts">
    <!-- Reemplaza el kit de FontAwesome con CDN público -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
            // =========================================================
            // CONFIGURACIÓN INICIAL
            // =========================================================
            let currentMotoData = null;
            
            // RUTA DE IMAGEN POR DEFECTO - AJUSTA SEGÚN TU PROYECTO
            const DEFAULT_IMAGE_PATH = 'https://placehold.co/600x400?text=Moto+Sin+Imagen';
            
            // =========================================================
            //  FUNCIÓN PRINCIPAL: VERIFICAR SI HAY MOTO REGISTRADA
            // =========================================================
            function verificarYMostrarMotoRegistrada() {
            console.log('=== VERIFICANDO MOTO ===');
            
            // Usa las variables GLOBALES
            const motoDesdeBackend = window.motoDelUsuarioBackend || null;
            const usuarioId = window.usuarioIdBackend || null;
            
            console.log('DATOS DESDE FRAGMENTO:');
            console.log('  - usuarioId:', usuarioId);
            console.log('  - motoDesdeBackend:', motoDesdeBackend);
            
            // RESTAURAR localStorage (si quieres usarlo)
            // localStorage.removeItem('motoUsuario'); // Descomenta si quieres limpiar
            
            // Lógica para mostrar
            if (motoDesdeBackend && motoDesdeBackend.placaMoto) {
                console.log('Mostrando moto del backend:', motoDesdeBackend.placaMoto);
                currentMotoData = motoDesdeBackend;
                mostrarVistaDetalle(motoDesdeBackend);
                return true;
            }
            
            console.log('Mostrando formulario vacío');
            mostrarVistaRegistro();
            return false;
        }

        // También COMENTA esta función:
        function guardarEnLocalStorage(datosMoto) {
            // TEMPORALMENTE NO GUARDAR
            // localStorage.setItem('motoUsuario', JSON.stringify(datosMoto));
            console.log('⚠️ localStorage deshabilitado temporalmente');
        }

        // =========================================================
        //  FUNCIONES DE PERSISTENCIA
        // =========================================================
        function guardarEnLocalStorage(datosMoto) {
            try {
                localStorage.setItem('motoUsuario', JSON.stringify(datosMoto));
                console.log('Datos guardados en localStorage');
            } catch (e) {
                console.error('Error guardando en localStorage:', e);
            }
        }

        function limpiarLocalStorage() {
            localStorage.removeItem('motoUsuario');
            sessionStorage.removeItem('imagenMotoSubida');
            console.log('localStorage limpiado');
        }

        // =========================================================
        // FUNCIONES DE VISUALIZACIÓN
        // =========================================================
        function mostrarVistaDetalle(datosMoto) {
            console.log('Mostrando vista de detalle');
            
            // Ocultar formulario de registro
            const registroDiv = document.getElementById('moto-manager__registro');
            if (registroDiv) {
                registroDiv.classList.remove('active');
                registroDiv.classList.add('hidden');
            }
            
            // Mostrar vista de detalle
            const detalleDiv = document.getElementById('moto-manager__detalle');
            if (detalleDiv) {
                detalleDiv.classList.remove('hidden');
                detalleDiv.classList.add('active');
                
                // Llenar todos los campos con los datos
                if (datosMoto.placaMoto) document.getElementById('detalle-placa').textContent = datosMoto.placaMoto;
                if (datosMoto.marcaMoto) document.getElementById('detalle-marca').textContent = datosMoto.marcaMoto;
                if (datosMoto.modeloMoto) document.getElementById('detalle-modelo').textContent = datosMoto.modeloMoto;
                if (datosMoto.colorMoto) document.getElementById('detalle-color').textContent = datosMoto.colorMoto;
                if (datosMoto.kilometraje) document.getElementById('detalle-kilometraje').textContent = datosMoto.kilometraje.toLocaleString() + ' km';
                if (datosMoto.tecnomecanica) document.getElementById('detalle-tecnomecanica').textContent = datosMoto.tecnomecanica;
                if (datosMoto.soatMoto) document.getElementById('detalle-soat').textContent = datosMoto.soatMoto;
                
                // Manejar la imagen CON FALLBACK
                const detalleImagen = document.getElementById('detalle-imagen');
                if (detalleImagen) {
                    let imagenUrl = datosMoto.imagenMoto;
                    
                    // Si no hay imagen, usar placeholder
                    if (!imagenUrl || imagenUrl === '' || imagenUrl === 'moto-default.jpg') {
                        imagenUrl = DEFAULT_IMAGE_PATH;
                    }
                    // Si es una ruta relativa sin /, agregar /img/
                    else if (!imagenUrl.startsWith('http') && !imagenUrl.startsWith('/') && !imagenUrl.startsWith('data:')) {
                        imagenUrl = '/img/' + imagenUrl;
                    }
                    
                    // Configurar imagen
                    detalleImagen.src = imagenUrl;
                    
                    // Si falla la carga, usar placeholder
                    detalleImagen.onerror = function() {
                        console.warn('Imagen no encontrada, usando placeholder:', imagenUrl);
                        this.src = DEFAULT_IMAGE_PATH;
                        this.onerror = null; // Prevenir loop infinito
                    };
                }
            }
        }

        function mostrarVistaRegistro() {
            console.log('Mostrando vista de registro');
            
            // Mostrar formulario de registro
            const registroDiv = document.getElementById('moto-manager__registro');
            if (registroDiv) {
                registroDiv.classList.remove('hidden');
                registroDiv.classList.add('active');
            }
            
            // Ocultar vista de detalle
            const detalleDiv = document.getElementById('moto-manager__detalle');
            if (detalleDiv) {
                detalleDiv.classList.remove('active');
                detalleDiv.classList.add('hidden');
            }
            
            // Si estamos en modo nuevo (no edición), limpiar formulario
            if (!currentMotoData) {
                limpiarFormulario();
            }
        }

        function limpiarFormulario() {
            const form = document.getElementById('motoForm');
            if (form) {
                form.reset();
                
                // Restaurar placeholder de imagen
                const imageDisplay = document.getElementById('moto-image-display');
                if (imageDisplay) {
                    imageDisplay.innerHTML = `
                        <i class="fas fa-motorcycle text-4xl mb-2 text-gray-400"></i>
                        <p class="text-sm font-bold">Subir foto de tu moto</p>
                        <p class="text-xs text-gray-400">Clic para seleccionar</p>
                    `;
                }
                
                console.log('Formulario limpiado');
            }
        }

        function precargarFormularioEdicion() {
            if (!currentMotoData) {
                console.log('No hay datos para precargar');
                return;
            }
            
            console.log('Precargando datos para edición');
            
            // Llenar campos del formulario con datos existentes
            document.getElementById('marca').value = currentMotoData.marcaMoto || '';
            document.getElementById('modelo').value = currentMotoData.modeloMoto || '';
            document.getElementById('color').value = currentMotoData.colorMoto || '';
            document.getElementById('placa').value = currentMotoData.placaMoto || '';
            document.getElementById('kilometraje').value = currentMotoData.kilometraje || 0;
            document.getElementById('soat').value = currentMotoData.soatMoto || '';
            document.getElementById('tecnomecanica').value = currentMotoData.tecnomecanica || '';
            
            // Precargar imagen si existe
            const imageDisplay = document.getElementById('moto-image-display');
            if (imageDisplay && currentMotoData.imagenMoto) {
                let imgUrl = currentMotoData.imagenMoto;
                
                // Asegurar ruta correcta
                if (imgUrl && !imgUrl.startsWith('http') && !imgUrl.startsWith('/') && !imgUrl.startsWith('data:')) {
                    imgUrl = '/img/' + imgUrl;
                }
                
                if (imgUrl && imgUrl !== 'moto-default.jpg') {
                    imageDisplay.innerHTML = `
                        <img src="${imgUrl}" 
                             alt="Foto de la moto" 
                             class="w-full h-full object-cover"
                             onerror="this.onerror=null; this.parentElement.innerHTML = '<i class=\"fas fa-motorcycle text-4xl mb-2 text-gray-400\"></i><p class=\"text-sm font-bold\">Imagen no disponible</p>';">
                    `;
                }
            }
        }

        // =========================================================
        //  INICIALIZACIÓN AL CARGAR LA PÁGINA
        // =========================================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Página cargada. Inicializando sistema de motos...');
            
            // 1. Verificar y mostrar moto registrada
            verificarYMostrarMotoRegistrada();
            
            // 2. Configurar todos los eventos
            configurarEventListeners();
            
            // 3. Configurar arrastrar y soltar para imagen
            configurarDragAndDrop();
        });

        function configurarEventListeners() {
            // 1. Botón Editar - Cambia a vista de edición
            document.getElementById('btn-editar-moto')?.addEventListener('click', function() {
                console.log('Botón editar clickeado - Cambiando a modo edición');
                mostrarVistaRegistro();
                precargarFormularioEdicion();
            });
            
            // 2. Botón Cancelar (si existe)
            document.getElementById('btn-cancelar')?.addEventListener('click', function() {
                console.log('Cancelar clickeado');
                if (currentMotoData) {
                    mostrarVistaDetalle(currentMotoData);
                } else {
                    mostrarVistaRegistro();
                    limpiarFormulario();
                }
            });
            
            // 3. Subida de imagen
            const uploadInput = document.getElementById('upload-moto-image');
            if (uploadInput) {
                uploadInput.addEventListener('change', async function(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    
                    console.log('📸 Imagen seleccionada:', file.name);
                    
                    // Previsualización inmediata
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const displayArea = document.getElementById('moto-image-display');
                        if (displayArea) {
                            displayArea.innerHTML = `<img src="${e.target.result}" alt="Foto de la moto" class="w-full h-full object-cover" />`;
                            // Guardar temporalmente
                            displayArea.dataset.tempImage = e.target.result;
                        }
                    };
                    reader.readAsDataURL(file);
                    
                    // Intentar subir al backend si es necesario
                    try {
                        const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
                        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
                        
                        if (csrfToken && csrfHeader) {
                            const formData = new FormData();
                            formData.append('imagenMoto', file);
                            
                            const response = await fetch('/api/motos/subir-imagen', {
                                method: 'POST',
                                headers: { [csrfHeader]: csrfToken },
                                body: formData
                            });
                            
                            if (response.ok) {
                                const result = await response.json();
                                sessionStorage.setItem('imagenMotoSubida', result.nombreArchivo || file.name);
                                console.log('Imagen subida al servidor');
                            }
                        }
                    } catch (error) {
                        console.log('Imagen guardada solo localmente:', error);
                        // Guardar solo en sessionStorage como fallback
                        sessionStorage.setItem('imagenTemp', file.name);
                    }
                });
            }
            
            // 4. Envío del formulario
            const motoForm = document.getElementById('motoForm');
            if (motoForm) {
                motoForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    console.log('📤 Enviando formulario...');
                    
                    // Obtener tokens CSRF
                    const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
                    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
                    
                    // Obtener imagen subida
                    const imagenSubida = sessionStorage.getItem('imagenMotoSubida');
                    const imagenTemp = document.getElementById('moto-image-display')?.dataset.tempImage;
                    
                    // Preparar datos
                    const formData = {
                        marcaMoto: document.getElementById('marca').value,
                        modeloMoto: document.getElementById('modelo').value,
                        colorMoto: document.getElementById('color').value,
                        placaMoto: document.getElementById('placa').value,
                        kilometraje: parseInt(document.getElementById('kilometraje').value) || 0,
                        soatMoto: document.getElementById('soat').value,
                        tecnomecanica: document.getElementById('tecnomecanica').value,
                        idMoto: currentMotoData ? currentMotoData.idMoto : null,
                        imagenMoto: imagenSubida || (currentMotoData ? currentMotoData.imagenMoto : '')
                    };
                    
                    // Validación básica
                    if (!formData.placaMoto || !formData.marcaMoto) {
                        alert('Por favor completa placa y marca');
                        return;
                    }
                    
                    try {
                        // Enviar al backend
                        const response = await fetch('/api/motos', {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                [csrfHeader]: csrfToken 
                            },
                            body: JSON.stringify(formData)
                        });
                        
                        if (response.ok) {
                            const resultado = await response.json();
                            console.log(' Moto guardada exitosamente');
                            
                            // Actualizar datos
                            currentMotoData = resultado;
                            
                            // Guardar en localStorage
                            guardarEnLocalStorage(resultado);
                            
                            // Limpiar almacenamiento temporal
                            sessionStorage.removeItem('imagenMotoSubida');
                            sessionStorage.removeItem('imagenTemp');
                            
                            // Mostrar vista de detalle
                            mostrarVistaDetalle(resultado);
                            
                            // Mostrar mensaje
                            alert('Moto registrada/actualizada correctamente');
                            
                        } else {
                            const error = await response.text();
                            console.error(' Error del servidor:', error);
                            alert('Error al guardar: ' + error);
                        }
                    } catch (error) {
                        console.error('Error de conexión:', error);
                        alert('Error de conexión con el servidor');
                    }
                });
            }
            
            // 5. Botón para eliminar moto (si existe)
            document.getElementById('btn-eliminar-moto')?.addEventListener('click', function() {
                if (confirm('¿Estás seguro de eliminar el registro de tu moto?')) {
                    limpiarLocalStorage();
                    currentMotoData = null;
                    mostrarVistaRegistro();
                    limpiarFormulario();
                    alert('Registro eliminado');
                }
            });
        }

        function configurarDragAndDrop() {
            const dropArea = document.getElementById('moto-image-display');
            if (!dropArea) return;
            
            // Prevenir comportamientos por defecto
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, preventDefaults, false);
            });
            
            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            // Resaltar área cuando se arrastra sobre ella
            ['dragenter', 'dragover'].forEach(eventName => {
                dropArea.addEventListener(eventName, highlight, false);
            });
            
            ['dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, unhighlight, false);
            });
            
            function highlight() {
                dropArea.classList.add('border-blue-500', 'border-2');
            }
            
            function unhighlight() {
                dropArea.classList.remove('border-blue-500', 'border-2');
            }
            
            // Manejar archivo soltado
            dropArea.addEventListener('drop', handleDrop, false);
            
            function handleDrop(e) {
                const dt = e.dataTransfer;
                const files = dt.files;
                
                if (files.length > 0) {
                    // Simular cambio en el input file
                    const input = document.getElementById('upload-moto-image');
                    if (input) {
                        // Necesitamos crear un DataTransfer para asignar archivos
                        const dataTransfer = new DataTransfer();
                        dataTransfer.items.add(files[0]);
                        input.files = dataTransfer.files;
                        
                        // Disparar evento change
                        const event = new Event('change', { bubbles: true });
                        input.dispatchEvent(event);
                    }
                }
            }
        }
        
        // =========================================================
        //   FUNCIONES PÚBLICAS (accesibles desde otros scripts)
        // =========================================================
        window.MotoManager = {
            obtenerDatosMoto: function() {
                return currentMotoData;
            },
            tieneMotoRegistrada: function() {
                return currentMotoData !== null;
            },
            recargarDatos: function() {
                return verificarYMostrarMotoRegistrada();
            }
        };
        
        console.log('Script de gestión de motos cargado correctamente');

        // =========================================================
        //      POSICIONAMIENTO RESPONSIVO DE BOTONES DE MOTOS
        // =========================================================
        document.addEventListener('DOMContentLoaded', function() {
            
            // Función para posicionar los botones de forma absoluta fuera del clip-path
            function positionMotoButtons() {
                const buttonsContainer = document.getElementById('moto-selector-buttons'); // Asegúrate de que este es el ID
                const imagenContainer = document.querySelector('.clip-moto'); 
                
                if (!buttonsContainer || !imagenContainer) {
                    // Si no se encuentran los contenedores, salimos.
                    return;
                }

                // 1. Obtener la posición del contenedor de la imagen
                const imagenRect = imagenContainer.getBoundingClientRect();
                
                // 2. Calcular la posición deseada para los botones:
                
                // Posición TOP: Centrar verticalmente en la imagen
                // imageRect.top es la posición superior de la imagen respecto al viewport.
                // imageRect.height es la altura de la imagen.
                const topPosition = imagenRect.top + (imagenRect.height / 2);
                
                // Posición LEFT: Colocar los botones justo donde empieza la imagen (left side del viewport)
                // Se resta el ancho de los botones (aprox 40px) y un margen (15px) para que queden afuera.
                // Usamos la posición LEFT del contenedor de la imagen.
                const leftPosition = imagenRect.left - 40 - 15; // 40px (ancho del botón) + 15px (margen)

                
                // 3. Aplicar estilos ABSOLUTOS (asumiendo que los botones tienen 'position: absolute' en CSS/Tailwind)
                
                // Usamos window.scrollY para compensar el desplazamiento vertical,
                // asegurando que la posición sea relativa al DOCUMENTO y no solo al viewport.
                buttonsContainer.style.position = 'absolute';
                buttonsContainer.style.top = `${topPosition + window.scrollY}px`;
                buttonsContainer.style.left = `${leftPosition + window.scrollX}px`;
                
                // Centrado vertical final (ya que topPosition es el centro de la imagen)
                buttonsContainer.style.transform = 'translateY(-20%)'; 
                
                // Log para verificación
                // console.log('Posicionamiento de botones:', {
                //     top: topPosition,
                //     left: leftPosition,
                //     scroll: window.scrollY
                // });
            }
            
            // 2. Ejecutar y re-ejecutar al cargar, redimensionar y hacer scroll
            
            // Usar requestAnimationFrame para la primera ejecución después de que el navegador calcule el layout.
            requestAnimationFrame(positionMotoButtons);
            
            // Ejecutar en eventos
            window.addEventListener('load', positionMotoButtons);
            window.addEventListener('resize', positionMotoButtons);
            window.addEventListener('scroll', positionMotoButtons); // Importante para posicionamiento fijo al viewport
        });

        // =========================================================
        //     CARRUSEL DE TIPS PARA MOTEROS (MANTENIENDO DISEÑO ORIGINAL)
        // =========================================================
        function inicializarCarruselTips() {
            console.log('Inicializando carrusel de tips...');
            
            const carruselContainer = document.getElementById('tips-carousel-container');
            const innerWrapper = document.getElementById('tips-inner-wrapper');
            const items = document.querySelectorAll('#tips-inner-wrapper .carousel-item');
            const indicators = document.querySelectorAll('.carousel-indicator');
            
            // CORRECCIÓN: !carrelContainer debe ser !carruselContainer
            if (!carruselContainer || !innerWrapper || items.length === 0) {
                console.error('Elementos del carrusel no encontrados (container, wrapper o items)');
                return;
            }
            
            console.log(`Carrusel encontrado con ${items.length} items`);
            
            let currentIndex = 0;
            const totalItems = items.length;
            let intervalo = null;
            const intervaloTime = 5000; // 5 segundos por slide
            
            // 1. CONFIGURACIÓN MÍNIMA PARA EL CARRUSEL
            // Solo lo absolutamente necesario para que 'flex' y 'transition' funcionen
            innerWrapper.style.display = 'flex';
            innerWrapper.style.transition = 'transform 0.5s ease-in-out';
            
            // 2. FUNCIÓN PRINCIPAL PARA MOVER EL CARRUSEL
            function irASlide(index, animate = true) {
                // Lógica de bucle infinito (loop)
                if (index < 0) {
                    // Si el índice es negativo, vamos al último
                    index = totalItems - 1;
                } else if (index >= totalItems) {
                    // Si el índice supera el total, vamos al primero
                    index = 0;
                }
                
                currentIndex = index;
                
                const anchoContenedor = carruselContainer.clientWidth;
                
                // Desactivar temporalmente la transición para el cambio instantáneo
                if (!animate) {
                    innerWrapper.style.transition = 'none';
                }

                // Solo transformación horizontal
                const translateX = -(currentIndex * anchoContenedor);
                innerWrapper.style.transform = `translateX(${translateX}px)`;
                
                // Reactivar la transición después de un breve momento
                if (!animate) {
                    requestAnimationFrame(() => {
                        innerWrapper.style.transition = 'transform 0.5s ease-in-out';
                    });
                }
                
                // Actualizar indicadores
                actualizarIndicadores();
                
                console.log(`Cambiando a slide ${currentIndex + 1}/${totalItems}`);
            }
            
            // 3. Actualizar indicadores activos
            function actualizarIndicadores() {
                indicators.forEach((indicator, index) => {
                    // Usamos las clases de Tailwind
                    if (index === currentIndex) {
                        indicator.classList.add('active', 'bg-white');
                        indicator.classList.remove('bg-gray-500');
                    } else {
                        indicator.classList.remove('active', 'bg-white');
                        indicator.classList.add('bg-gray-500');
                    }
                });
            }
            
            // 4. Siguiente slide
            function siguienteSlide() {
                irASlide(currentIndex + 1);
            }
            
            // 5. Iniciar/Detener carrusel automático
            function iniciarCarruselAutomatico() {
                detenerCarruselAutomatico();
                intervalo = setInterval(siguienteSlide, intervaloTime);
            }
            
            function detenerCarruselAutomatico() {
                if (intervalo) {
                    clearInterval(intervalo);
                    intervalo = null;
                }
            }
            
            function reiniciarCarruselAutomatico() {
                detenerCarruselAutomatico();
                iniciarCarruselAutomatico();
            }

            // 6. Configurar eventos para indicadores
            indicators.forEach((indicator, index) => {
                indicator.addEventListener('click', () => {
                    irASlide(index);
                    reiniciarCarruselAutomatico(); // Reinicia el contador al interactuar
                });
            });
            
            // 7. Pausar al hacer hover
            carruselContainer.addEventListener('mouseenter', detenerCarruselAutomatico);
            carruselContainer.addEventListener('mouseleave', iniciarCarruselAutomatico);
            
            // 8. Inicializar la configuración de anchos
            function configurarAnchos() {
                const anchoFinal = carruselContainer.clientWidth;
                
                if (anchoFinal === 0) {
                    console.warn('El ancho del contenedor es 0. Intentando de nuevo en 300ms.');
                    setTimeout(configurarAnchos, 300);
                    return;
                }
                
                // Aplicar ancho final a cada item y ajustar el wrapper
                items.forEach(item => {
                    // Asegurar que cada item ocupe el ancho del contenedor
                    item.style.minWidth = `${anchoFinal}px`;
                    item.style.maxWidth = `${anchoFinal}px`;
                    item.style.width = `${anchoFinal}px`;
                    item.style.flexShrink = '0'; 
                    
                    // Reajuste del contenido interno para mantener el diseño
                    const contenido = item.querySelector('.skew-content-c');
                    if (contenido) {
                        // Asegurar que el contenido interno tome el ancho completo disponible después de los paddings/margins
                        contenido.style.width = '100%';
                    }
                });
                
                // Ajustar ancho total del wrapper (importante para que el flex funcione bien)
                innerWrapper.style.width = `${totalItems * anchoFinal}px`;
                
                // Posicionar en el slide actual (o 0) sin animación para el primer ajuste
                irASlide(currentIndex, false); 
                
                console.log('✅ Carrusel inicializado manteniendo diseño original');
                console.log('Ancho por slide:', anchoFinal, 'px');

                // Iniciar carrusel automático
                iniciarCarruselAutomatico();
            }

            // 9. Manejo de redimensionamiento
            let resizeTimeout;
            window.addEventListener('resize', () => {
                detenerCarruselAutomatico(); // Detener durante el redimensionamiento
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    configurarAnchos(); // Re-ejecutar la configuración de anchos
                    reiniciarCarruselAutomatico(); // Re-iniciar el carrusel
                }, 250);
            });
            
            // Llamar a la función de configuración inicial
            configurarAnchos();
        }

        // =========================================================
        //     INTEGRACIÓN CON TU SCRIPT EXISTENTE
        // =========================================================
        // Integración simplificada para asegurar la ejecución
        document.addEventListener('DOMContentLoaded', function() {
            // Esperar un breve momento para asegurar que Tailwind haya aplicado los estilos base
            setTimeout(inicializarCarruselTips, 500); 
        });

        window.addEventListener('load', function() {
            // También ejecutar al cargar completamente la página (incluidas imágenes)
            setTimeout(inicializarCarruselTips, 300);
        });

        // =========================================================
        //   Scrip para el funcionamiento de las alertas por medio del SEEDERS
        // =========================================================

        // CONFIGURACIÓN - AJUSTA ESTOS VALORES
        const USUARIO_ID = 1; // Cambia esto por el ID del usuario logueado
        const API_URL = 'http://localhost:8080/api/alertas/usuario/' + USUARIO_ID;

        // COLOR PRINCIPAL #1E2333
        const COLOR_PRINCIPAL = '#1E2333';

        // Cargar alertas cuando la página cargue
        document.addEventListener('DOMContentLoaded', function() {
            cargarAlertas();
        });

        async function cargarAlertas() {
            const container = document.getElementById('alertas-container');
            
            try {
                console.log('Solicitando alertas desde:', API_URL);
                
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error(`Error del servidor: ${response.status}`);
                }
                
                const alertas = await response.json();
                console.log('Alertas recibidas:', alertas);
                
                // Mostrar las alertas
                mostrarAlertasHTML(alertas);
                
            } catch (error) {
                console.error('Error al cargar alertas:', error);
                
                // Mostrar mensaje de error
                container.innerHTML = `
                    <div class="text-center py-6">
                        <div class="text-red-500 text-2xl mb-2">⚠️</div>
                        <p class="text-gray-700">No se pudieron cargar las alertas</p>
                        <p class="text-sm text-gray-500 mt-1">${error.message}</p>
                        <button onclick="cargarAlertas()" 
                                class="mt-3 px-3 py-1 bg-blue-100 text-blue-700 rounded text-sm hover:bg-blue-200">
                            Reintentar
                        </button>
                    </div>
                `;
                
                // Mostrar datos de ejemplo como respaldo
                mostrarDatosEjemplo();
            }
        }

        function mostrarAlertasHTML(alertas) {
            const container = document.getElementById('alertas-container');
            
            if (!alertas || alertas.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-6">
                        <div class="text-gray-400 text-3xl mb-2">🔔</div>
                        <p class="text-gray-500">No tienes alertas programadas</p>
                        <p class="text-sm text-gray-400 mt-1">Todo está al día</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            
            alertas.forEach(alerta => {
                // Determinar colores según tipo
                let colores = getColoresPorTipo(alerta.tipo);
                
                html += `
                <div class="mb-4 p-5 rounded-xl shadow-sm transition-all duration-300 hover:shadow-md" 
                    style="background: ${COLOR_PRINCIPAL}; border-left: 4px solid ${colores.borde};">
                    <div class="flex justify-between items-start">
                        <div class="flex items-start space-x-4">
                            <!-- Ícono con fondo del color específico del tipo -->
                            <div class="flex-shrink-0 w-10 h-10 rounded-lg flex items-center justify-center" 
                                style="background: ${colores.badgeBg}">
                                <span class="text-white text-lg">
                                    ${getEmojiIcono(alerta.tipo)}
                                </span>
                            </div>
                            
                            <!-- Contenido -->
                            <div class="flex-1">
                                <div class="flex items-center">
                                    <h4 class="font-bold text-lg" style="color: ${colores.texto}">${alerta.titulo}</h4>
                                    ${!alerta.leida ? 
                                        '<span class="ml-2 h-2 w-2 rounded-full bg-red-500 animate-pulse"></span>' : 
                                        ''}
                                </div>
                                
                                <p class="mt-2 text-gray-300">${alerta.mensaje}</p>
                                
                                <!-- Fechas si existen -->
                                ${mostrarFechas(alerta)}
                                
                                <!-- Moto si existe -->
                                ${alerta.moto ? `
                                <div class="mt-3 text-sm" style="color: ${colores.texto}">
                                    <span class="font-medium">🏍️ Moto:</span> 
                                    ${alerta.moto.marcaMoto || ''} ${alerta.moto.modeloMoto || ''}
                                </div>
                                ` : ''}
                                
                                <!-- Botón de acción si existe -->
                                ${alerta.accionUrl ? `
                                <div class="mt-4">
                                    <a href="${alerta.accionUrl}" 
                                    class="inline-flex items-center px-4 py-2 rounded-lg font-medium transition-all hover:scale-105"
                                    style="background: ${colores.boton}; color: white;">
                                        ${alerta.accionTexto}
                                        <svg class="ml-2 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                                        </svg>
                                    </a>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                        
                        <!-- Badge tipo -->
                        <span class="text-xs px-3 py-1.5 rounded-full font-bold uppercase tracking-wide"
                            style="background: ${colores.badge}; color: ${colores.badgeText}; border: 1px solid ${colores.badgeBorder};">
                            ${alerta.tipo}
                        </span>
                    </div>
                    
                    <!-- Estado -->
                    <div class="mt-4 pt-3 border-t" style="border-color: rgba(255,255,255,0.1);">
                        <div class="flex justify-between text-xs">
                            <span style="color: ${colores.texto}">
                                ${alerta.activa ? ' Activa' : 'Inactiva'}
                            </span>
                            <span class="text-gray-400">
                                ${alerta.leida ? 'Leída' : 'No leída'}
                            </span>
                        </div>
                    </div>
                </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function mostrarFechas(alerta) {
            let html = '';
            
            const fechas = [
                { campo: alerta.vencimientoSoat, label: 'SOAT', icono: '📋' },
                { campo: alerta.vencimientoTecnomecanica, label: 'Tecnomecánica', icono: '🔧' },
                { campo: alerta.vencimientoLicenciaConduccion, label: 'Licencia', icono: '📄' },
                { campo: alerta.mantenimientoGeneral, label: 'Mantenimiento', icono: '⚙️' }
            ];
            
            let hayFechas = false;
            let fechasHTML = '';
            
            fechas.forEach(fecha => {
                if (fecha.campo) {
                    hayFechas = true;
                    fechasHTML += `
                    <div class="flex items-center mt-2">
                        <span class="mr-2">${fecha.icono}</span>
                        <span class="text-sm text-gray-400 mr-2">${fecha.label}:</span>
                        <span class="text-sm text-white font-medium">${formatearFecha(fecha.campo)}</span>
                    </div>
                    `;
                }
            });
            
            if (hayFechas) {
                html = `
                <div class="mt-3 p-3 rounded-lg" style="background: rgba(0,0,0,0.2);">
                    ${fechasHTML}
                </div>
                `;
            }
            
            return html;
        }

        function getColoresPorTipo(tipo) {
            // Colores que contrastan bien con #1E2333
            switch(tipo) {
                case 'SOAT':
                    return {
                        borde: '#EF4444', // Rojo
                        texto: '#FCA5A5', // Rojo claro
                        badge: '#DC2626', // Rojo oscuro
                        badgeText: '#FFFFFF',
                        badgeBg: '#EF4444', // Rojo
                        badgeBorder: '#B91C1C', // Rojo más oscuro
                        boton: '#DC2626' // Rojo oscuro
                    };
                case 'TECNOMECANICA':
                    return {
                        borde: '#F59E0B', // Ámbar
                        texto: '#FCD34D', // Ámbar claro
                        badge: '#D97706', // Ámbar oscuro
                        badgeText: '#FFFFFF',
                        badgeBg: '#F59E0B', // Ámbar
                        badgeBorder: '#B45309', // Ámbar más oscuro
                        boton: '#D97706' // Ámbar oscuro
                    };
                case 'PROMOCION':
                    return {
                        borde: '#10B981', // Esmeralda
                        texto: '#A7F3D0', // Esmeralda claro
                        badge: '#059669', // Esmeralda oscuro
                        badgeText: '#FFFFFF',
                        badgeBg: '#10B981', // Esmeralda
                        badgeBorder: '#047857', // Esmeralda más oscuro
                        boton: '#059669' // Esmeralda oscuro
                    };
                case 'LICENCIA':
                    return {
                        borde: '#3B82F6', // Azul
                        texto: '#93C5FD', // Azul claro
                        badge: '#1D4ED8', // Azul oscuro
                        badgeText: '#FFFFFF',
                        badgeBg: '#3B82F6', // Azul
                        badgeBorder: '#1E40AF', // Azul más oscuro
                        boton: '#1D4ed8' // Azul oscuro
                    };
                case 'MANTENIMIENTO':
                    return {
                        borde: '#8B5CF6', // Violeta
                        texto: '#C4B5FD', // Violeta claro
                        badge: '#7C3AED', // Violeta oscuro
                        badgeText: '#FFFFFF',
                        badgeBg: '#8B5CF6', // Violeta
                        badgeBorder: '#6D28D9', // Violeta más oscuro
                        boton: '#7C3AED' // Violeta oscuro
                    };
                default:
                    return {
                        borde: '#6B7280', // Gris
                        texto: '#D1D5DB', // Gris claro
                        badge: '#4B5563', // Gris oscuro
                        badgeText: '#FFFFFF',
                        badgeBg: '#6B7280', // Gris
                        badgeBorder: '#374151', // Gris más oscuro
                        boton: '#4B5563' // Gris oscuro
                    };
            }
        }

        function getEmojiIcono(tipo) {
            switch(tipo) {
                case 'SOAT': return '🚨';
                case 'TECNOMECANICA': return '🔧';
                case 'PROMOCION': return '🎁';
                case 'MANTENIMIENTO': return '⚙️';
                case 'LICENCIA': return '📄';
                default: return '🔔';
            }
        }

        function formatearFecha(fechaStr) {
            if (!fechaStr) return '';
            const fecha = new Date(fechaStr);
            return fecha.toLocaleDateString('es-ES', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
        }

        // Función para mostrar datos de ejemplo si falla la API
        function mostrarDatosEjemplo() {
            const datosEjemplo = [
                {
                    tipo: "SOAT",
                    titulo: "SOAT próximo a vencer",
                    mensaje: "Tu SOAT vence el 15 de Diciembre 2025. Renueva para evitar multas.",
                    vencimientoSoat: "2025-12-15",
                    accionUrl: "/renovar-soat",
                    accionTexto: "Renovar SOAT",
                    leida: false,
                    activa: true
                },
                {
                    tipo: "TECNOMECANICA",
                    titulo: "Tecnomecánica próxima a vencer",
                    mensaje: "Tu revisión tecnomecánica vence el 20 de Diciembre 2025.",
                    vencimientoTecnomecanica: "2025-12-20",
                    accionUrl: "/agendar-tecnomecanica",
                    accionTexto: "Agendar cita",
                    leida: false,
                    activa: true
                }
            ];
            
            mostrarAlertasHTML(datosEjemplo);
        }

        // Añadir estilos CSS para mejorar la apariencia
        const style = document.createElement('style');
        style.textContent = `
            .alerta-item {
                transition: all 0.3s ease;
            }
            
            .alerta-item:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            }
            
            .badge-alerta {
                font-size: 0.7rem;
                letter-spacing: 0.05em;
            }
            
            /* Animación para alertas no leídas */
            @keyframes pulse-alerta {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.5; }
            }
            
            .alerta-no-leida {
                animation: pulse-alerta 2s infinite;
            }
        `;
        document.head.appendChild(style);

    </script>
</div>
